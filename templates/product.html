{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        <img src="{{ url_for('static', filename=product.image) }}" class="img-fluid" alt="{{ product.name }}">
    </div>
    <div class="col-md-6">
        <h2>{{ product.name }}</h2>
        <h4>${{ product.price }}</h4>
        <p>{{ product.description }}</p>
        <a href="{{ url_for('add_to_basket', product_id=product.id) }}" class="btn btn-success">Add to Basket</a>
        <a href="{{ url_for('home') }}" class="btn btn-secondary">Back</a>
    </div>
</div>
{% endblock %}
